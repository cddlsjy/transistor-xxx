name: Build Android APK (Universal)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置 JDK 17
      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 2. 赋予 gradlew 执行权限 (重要：必须使用项目自带的 wrapper)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 3. 智能检测并构建 (核心改进部分)
      - name: Detect Flavor and Build APK
        id: build_step
        run: |
          echo "🔍 Detecting available build tasks..."
          
          # 获取所有任务列表并过滤出 debug 相关的 assemble 任务
          # 我们查找是否包含 "free" (不区分大小写) 的 debug 任务
          HAS_FREE_FLAVOR=$(./gradlew tasks --all | grep -i "assembleFreeDebug" || true)
          
          if [ -n "$HAS_FREE_FLAVOR" ]; then
            echo "✅ Found 'assembleFreeDebug' task. Building with Free flavor..."
            BUILD_TASK="assembleFreeDebug"
          else
            echo "⚠️ 'assembleFreeDebug' not found. Falling back to default 'assembleDebug'..."
            BUILD_TASK="assembleDebug"
          fi
          
          echo "🚀 Starting build with task: $BUILD_TASK"
          ./gradlew $BUILD_TASK --stacktrace --no-daemon
          
          # 保存构建任务名供后续步骤参考（可选）
          echo "used_task=$BUILD_TASK" >> $GITHUB_OUTPUT

      # 4. 查找并上传 APK
      # 改进点：扩大搜索范围，防止因风味不同导致 APK 路径变化
      - name: Find and upload APK
        id: find_apk
        run: |
          echo "📂 Searching for generated APKs..."
          
          # 搜索所有可能的 debug apk 路径 (包括带风味和不带风味的)
          # 路径模式：*/outputs/apk/*/debug/*.apk 或 */outputs/apk/debug/*.apk
          APK_PATH=$(find . -type f -name "*.apk" | grep -i "debug" | grep -v "unsigned" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ Error: No Debug APK found after build!"
            echo "📂 Listing all files in build/outputs:"
            find . -path "*/build/outputs/*" -type f 2>/dev/null || echo "No outputs found."
            exit 1
          fi
          
          echo "✅ Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ steps.build_step.outputs.used_task }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7
